services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NALAR_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "3000:3000"
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ML_MODEL_PATH: /app/models/risk-model.joblib
    volumes:
      - ml_models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  migrate:
    image: node:22-alpine
    profiles:
      - tools
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    command: sh -c "npm ci && npx prisma migrate deploy"
    networks:
      - app-network

volumes:
  ml_models:

networks:
  app-network:
    driver: bridge
